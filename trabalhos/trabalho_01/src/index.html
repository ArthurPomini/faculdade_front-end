<!DOCTYPE html>
<html lang="pt-br">
<head>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .pirata-one-regular {
            font-family: "Pirata One", system-ui;
            font-weight: 400;
            font-style: normal;
        }


        figure img {
            justify-self: center;
        }

        body {
            background-color: #F5F5F5;
            margin: 0 100px;
        }

        h1 {
            font-size: 60px;
            text-align: center;
            margin: 80px 0;
        }

        #container {
            margin: 0 auto;
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        #caminhante, #brinco {
            max-width: 20%;
            height: auto;
        }

        #noite, #cristo {
            max-width: 29%;
            height: auto;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Pirata+One&family=Roboto:ital,wght@0,100..900;1,100..900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <title> Museu do Arthur </title>
</head>
<body>
    <h1 class="pirata-one-regular"> Minhas obras prediletas </h1>
    <figure id="container">
        <img id="caminhante" src="../img/caminhante-mar-de-nevoa.jpg" />
        <img id="brinco" src="../img/brinco-de-perola.jpg" />
        <img id="noite" src="../img/noite-estrelada.jpg" />
        <img id="cristo" src="../img/cristo-no-deserto.jpg" />
    </figure>
</body>
</html>
